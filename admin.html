<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHINE ON Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { background: #f7f3f1; }
    .admin-shell { max-width: 1200px; margin: 0 auto; padding: 38px 20px 80px; }
    .admin-top { display:flex; justify-content:space-between; align-items:center; gap:20px; margin-bottom:28px; }
    .admin-grid { display:grid; grid-template-columns: .75fr 1.25fr; gap:24px; }
    .panel { background:white; border:1px solid var(--line); border-radius:24px; padding:24px; }
    .panel h2 { font-size:30px; margin-bottom:18px; }
    .admin-list { display:grid; gap:12px; }
    .admin-item { border:1px solid var(--line); border-radius:16px; padding:14px; display:grid; grid-template-columns:1fr auto; gap:14px; }
    .admin-item h3 { font-size:18px; }
    .admin-item p { margin:5px 0; color:var(--muted); font-size:13px; }
    .admin-actions { display:flex; gap:8px; }
    .small-button { border:1px solid var(--line); border-radius:999px; background:white; padding:8px 12px; cursor:pointer; }
    .danger { color:#a94f4f; }
    .order-card { border:1px solid var(--line); border-radius:16px; padding:16px; }
    .order-card + .order-card { margin-top:12px; }
    .order-head { display:flex; justify-content:space-between; gap:12px; }
    .order-card ul { padding-left:20px; color:var(--muted); }
    .admin-note { color:var(--muted); line-height:1.6; }
    @media (max-width: 850px) { .admin-grid { grid-template-columns:1fr; } .admin-top { align-items:flex-start; flex-direction:column; } }
  </style>
</head>
<body>
  <div class="admin-shell">
    <div class="admin-top">
      <div>
        <span class="eyebrow">SHINE ON JEWELRY</span>
        <h1 style="font-size:48px">Admin Dashboard</h1>
      </div>
      <a class="secondary-button" href="index.html">← Back to store</a>
    </div>

    <p class="admin-note">Free demo dashboard: products and orders are stored only in this browser. For a real online database, connect Supabase or Firebase later.</p>

    <div class="admin-grid">
      <section class="panel">
        <h2>Add Product</h2>
        <form id="productForm">
          <label>Product name<input name="name" required placeholder="Diamond-style earrings" /></label>
          <label>Price (USD)<input name="price" type="number" min="0" step="0.01" required placeholder="9.90" /></label>
          <label>Category
            <select name="category">
              <option>Earrings</option>
              <option>Necklaces</option>
              <option>Bracelets</option>
              <option>Rings</option>
            </select>
          </label>
          <label>Emoji / icon<input name="emoji" placeholder="💎" /></label>
          <label>Description<textarea name="description" required placeholder="Describe the product..."></textarea></label>
          <button class="primary-button full-width" type="submit">Add Product</button>
        </form>
        <button class="small-button danger" id="resetProducts" style="margin-top:14px">Reset sample products</button>
      </section>

      <section class="panel">
        <h2>Products</h2>
        <div class="admin-list" id="productList"></div>
      </section>

      <section class="panel" style="grid-column: 1 / -1">
        <div style="display:flex;justify-content:space-between;gap:20px;align-items:center;margin-bottom:18px">
          <h2 style="margin:0">Orders</h2>
          <button class="small-button danger" id="clearOrders">Clear Orders</button>
        </div>
        <div id="ordersList"></div>
      </section>
    </div>
  </div>

  <script src="data.js"></script>
  <script>
    const KEYS = { products: "shineOnProducts", orders: "shineOnOrders" };
    let products = JSON.parse(localStorage.getItem(KEYS.products)) || window.DEFAULT_PRODUCTS;

    function saveProducts() {
      localStorage.setItem(KEYS.products, JSON.stringify(products));
    }

    function renderProducts() {
      const list = document.getElementById("productList");
      list.innerHTML = products.map(p => `
        <div class="admin-item">
          <div>
            <h3>${p.emoji || "💎"} ${p.name}</h3>
            <p>${p.category} · $${Number(p.price).toFixed(2)}</p>
            <p>${p.description}</p>
          </div>
          <div class="admin-actions">
            <button class="small-button danger" onclick="deleteProduct(${p.id})">Delete</button>
          </div>
        </div>
      `).join("");
    }

    window.deleteProduct = function(id) {
      products = products.filter(p => p.id !== id);
      saveProducts();
      renderProducts();
    };

    document.getElementById("productForm").addEventListener("submit", event => {
      event.preventDefault();
      const data = Object.fromEntries(new FormData(event.target).entries());
      products.unshift({
        id: Date.now(),
        name: data.name,
        price: Number(data.price),
        category: data.category,
        emoji: data.emoji || "💎",
        description: data.description
      });
      saveProducts();
      renderProducts();
      event.target.reset();
    });

    document.getElementById("resetProducts").addEventListener("click", () => {
      products = [...window.DEFAULT_PRODUCTS];
      saveProducts();
      renderProducts();
    });

    function renderOrders() {
      const orders = JSON.parse(localStorage.getItem(KEYS.orders)) || [];
      const box = document.getElementById("ordersList");

      if (!orders.length) {
        box.innerHTML = '<p class="admin-note">No orders yet. Place a demo order from the store.</p>';
        return;
      }

      box.innerHTML = orders.map(order => `
        <article class="order-card">
          <div class="order-head">
            <div>
              <strong>Order #${String(order.id).slice(-6)}</strong>
              <div class="admin-note">${new Date(order.createdAt).toLocaleString()}</div>
            </div>
            <strong>$${Number(order.total).toFixed(2)}</strong>
          </div>
          <p><strong>${order.customer.name}</strong> · ${order.customer.phone}</p>
          <p class="admin-note">${order.customer.address} · ${order.customer.payment}</p>
          <ul>
            ${order.items.map(item => `<li>${item.name} × ${item.qty}</li>`).join("")}
          </ul>
        </article>
      `).join("");
    }

    document.getElementById("clearOrders").addEventListener("click", () => {
      localStorage.removeItem(KEYS.orders);
      renderOrders();
    });

    renderProducts();
    renderOrders();
  </script>
</body>
</html>
